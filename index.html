<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Notes - Airplane</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            --accent-yellow: #fff9c4;
            --accent-blue: #e3f2fd;
            --sky-blue: #03a9f4;
            --paper-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 600px;
            perspective: 1000px;
        }

        .note-card {
            background: var(--paper-color);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 1s ease-in-out, opacity 1s ease-in-out;
            border-top: 15px solid var(--accent-yellow);
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #333;
            margin-top: 0;
            font-weight: 300;
            border-bottom: 2px solid var(--accent-blue);
            display: inline-block;
        }

        textarea {
            width: 100%;
            height: 200px;
            border: none;
            outline: none;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #444;
            resize: none;
            background: transparent;
            margin-top: 20px;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        button {
            background: var(--sky-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(3, 169, 244, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(3, 169, 244, 0.4);
        }

        /* Airplane Animation Classes */
        .flying {
            animation: foldAndFly 2.5s forwards ease-in-out;
        }

        @keyframes foldAndFly {
            0% {
                transform: rotateX(0) rotateY(0) scale(1);
            }
            30% {
                transform: rotateX(60deg) rotateY(-20deg) scale(0.8) skewX(20deg);
                opacity: 0.9;
            }
            60% {
                transform: rotateX(90deg) rotateY(-40deg) scale(0.5) translate(100px, -100px);
                opacity: 0.7;
            }
            100% {
                transform: rotateX(90deg) rotateY(-90deg) scale(0.1) translate(2000px, -2000px);
                opacity: 0;
            }
        }

        .success-msg {
            position: fixed;
            top: 20px;
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            transform: translateY(-100px);
            transition: transform 0.5s ease;
        }

        .success-msg.show {
            transform: translateY(0);
        }

        .bg-circle {
            position: absolute;
            z-index: 0;
            border-radius: 50%;
            filter: blur(80px);
        }
        .c1 { width: 300px; height: 300px; background: var(--accent-yellow); top: -100px; right: -100px; opacity: 0.5; }
        .c2 { width: 400px; height: 400px; background: var(--accent-blue); bottom: -150px; left: -150px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>

    <div id="success" class="success-msg">Note sent into the clouds!</div>

    <div class="container">
        <div id="noteCard" class="note-card">
            <h1>New Note</h1>
            <textarea id="noteText" placeholder="Write something inspiring..."></textarea>
            <div class="controls">
                <button onclick="sendNote()">
                    <span>Send Note</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        function sendNote() {
            const card = document.getElementById('noteCard');
            const success = document.getElementById('success');
            
            // Start animation
            card.classList.add('flying');
            
            // Show success message
            setTimeout(() => {
                success.classList.add('show');
            }, 1500);

            // Reset for next note
            setTimeout(() => {
                card.classList.remove('flying');
                document.getElementById('noteText').value = '';
                success.classList.remove('show');
            }, 4000);
        }
    </script>
</body>
</html>
